name: WhatWouldBillDo
options:
  bundleIdPrefix: com.whatwouldbilldo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    DEVELOPMENT_TEAM: 7BW79QC9WM
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  WhatWouldBillDo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WhatWouldBillDo
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whatwouldbilldo.app
        PRODUCT_NAME: WhatWouldBillDo
        INFOPLIST_KEY_CFBundleDisplayName: "What Would Bill Do?"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Bill sends you a daily reflection and celebrates your milestones."
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AmberAccent
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: WhatWouldBillDo/WhatWouldBillDo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.whatwouldbilldo.app.shared
        aps-environment: development
